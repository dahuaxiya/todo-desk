name: Release macOS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    timeout-minutes: 60
    env:
      MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Require signing and notarization secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in MACOS_CERTIFICATE_P12_BASE64 MACOS_CERTIFICATE_PASSWORD APPLE_API_KEY_P8 APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required GitHub secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Prepare Apple credentials
        shell: bash
        run: |
          set -euo pipefail
          certificate_path="$RUNNER_TEMP/todo-desk-developer-id.p12"
          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"

          # electron-builder imports the P12 into an isolated temporary keychain.
          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 -D > "$certificate_path"
          printf '%s' "$APPLE_API_KEY_P8" > "$api_key_path"
          chmod 600 "$certificate_path" "$api_key_path"

          echo "CSC_LINK=$certificate_path" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$MACOS_CERTIFICATE_PASSWORD" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY=$api_key_path" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org

      - name: Check tag and package versions
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p 'require("./package.json").version')"
          if [[ "$GITHUB_REF_NAME" != "v$package_version" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version v$package_version"
            exit 1
          fi

      - name: Build signed and notarized packages
        run: npm run dist:mac -- --config.directories.output=release

      - name: Verify signatures, notarization, and Gatekeeper
        run: npm run verify:mac -- release

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release/*.dmg release/*.zip)
          if [[ "${#assets[@]}" -ne 4 ]]; then
            echo "::error::Expected four macOS release assets, found ${#assets[@]}"
            exit 1
          fi

          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          fi
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
